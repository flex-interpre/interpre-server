spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # PostgreSQL 문법 지정
    show-sql: true # 로그 확인용 sql 쿼리문 확인
app:
  jwt:
    key: ${JWT_SECRET_KEY}
    token-expiration : 24

